name: Build APK Android

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Baixar codigo
        uses: actions/checkout@v4

      - name: Instalar Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Instalar Flutter 3.19.6
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.6'
          channel: 'stable'

      - name: Criar projeto Flutter limpo
        run: flutter create --org com.maicola --project-name locmaicola --platforms android myapp

      - name: Copiar codigo e pubspec
        run: |
          cp lib/main.dart myapp/lib/main.dart
          cp pubspec.yaml myapp/pubspec.yaml

      - name: Instalar dependencias
        working-directory: myapp
        run: flutter pub get

      - name: Aplicar icone personalizado
        run: |
          if [ -f assets/icon.png ]; then
            for dir in xxxhdpi xxhdpi xhdpi hdpi mdpi; do
              cp assets/icon.png myapp/android/app/src/main/res/mipmap-$dir/ic_launcher.png
            done
            echo "Icone aplicado"
          else
            echo "Sem icone, usando padrao"
          fi

      - name: Corrigir versao Kotlin e AndroidManifest
        working-directory: myapp
        run: |
          python3 - << 'PYEOF'
          import re

          # Corrigir kotlin_version no build.gradle raiz
          with open("android/build.gradle", "r") as f:
              content = f.read()
          content = re.sub(
              r"ext\.kotlin_version\s*=\s*['\"].*?['\"]",
              "ext.kotlin_version = '1.9.0'",
              content
          )
          with open("android/build.gradle", "w") as f:
              f.write(content)
          print("kotlin_version atualizado para 1.9.0")

          # Corrigir AndroidManifest com v2 embedding e permissoes GPS
          manifest = """<manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.INTERNET"/>
              <uses-permission android:name="android.permission.ACCESS_FINE_LOCATION"/>
              <uses-permission android:name="android.permission.ACCESS_COARSE_LOCATION"/>
              <application
                  android:label="Minha Localizacao"
                  android:name="${applicationName}"
                  android:icon="@mipmap/ic_launcher"
                  android:allowBackup="true">
                  <activity
                      android:name=".MainActivity"
                      android:exported="true"
                      android:launchMode="singleTop"
                      android:configChanges="orientation|keyboardHidden|keyboard|screenSize|smallestScreenSize|locale|layoutDirection|fontScale|screenLayout|density|uiMode"
                      android:hardwareAccelerated="true"
                      android:windowSoftInputMode="adjustResize">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN"/>
                          <category android:name="android.intent.category.LAUNCHER"/>
                      </intent-filter>
                  </activity>
                  <meta-data
                      android:name="flutterEmbedding"
                      android:value="2"/>
              </application>
              <queries>
                  <intent>
                      <action android:name="android.intent.action.VIEW"/>
                      <data android:scheme="https"/>
                  </intent>
              </queries>
          </manifest>"""
          with open("android/app/src/main/AndroidManifest.xml", "w") as f:
              f.write(manifest)
          print("AndroidManifest atualizado com v2 embedding!")
          PYEOF

      - name: Build APK
        working-directory: myapp
        run: flutter build apk --release --split-per-abi

      - name: Salvar APK
        uses: actions/upload-artifact@v4
        with:
          name: apk-minha-localizacao
          path: myapp/build/app/outputs/flutter-apk/*.apk
          retention-days: 7
