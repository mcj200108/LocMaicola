name: Build APK Android

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Baixar codigo
        uses: actions/checkout@v4

      - name: Instalar Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Instalar Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Criar projeto e compilar APK
        run: |
          # Criar projeto Flutter limpo
          flutter create --org com.maicola --project-name locmaicola --platforms android myapp

          # Copiar codigo
          cp lib/main.dart myapp/lib/main.dart
          cp pubspec.yaml myapp/pubspec.yaml

          # Entrar na pasta do projeto
          cd myapp

          # Instalar dependencias
          flutter pub get

          # Aplicar icone se existir
          if [ -f ../assets/icon.png ]; then
            for dir in xxxhdpi xxhdpi xhdpi hdpi mdpi; do
              cp ../assets/icon.png android/app/src/main/res/mipmap-$dir/ic_launcher.png
            done
            echo "Icone aplicado"
          fi

          # Mostrar build.gradle para debug
          echo "=== android/build.gradle ==="
          cat android/build.gradle
          echo "=== android/app/build.gradle ==="
          cat android/app/build.gradle

          # Corrigir AndroidManifest com GPS e v2 embedding
          python3 - << 'PYEOF'
          manifest = """<manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.INTERNET"/>
              <uses-permission android:name="android.permission.ACCESS_FINE_LOCATION"/>
              <uses-permission android:name="android.permission.ACCESS_COARSE_LOCATION"/>
              <application
                  android:label="Minha Localizacao"
                  android:name="${applicationName}"
                  android:icon="@mipmap/ic_launcher"
                  android:allowBackup="true">
                  <activity
                      android:name=".MainActivity"
                      android:exported="true"
                      android:launchMode="singleTop"
                      android:configChanges="orientation|keyboardHidden|keyboard|screenSize|smallestScreenSize|locale|layoutDirection|fontScale|screenLayout|density|uiMode"
                      android:hardwareAccelerated="true"
                      android:windowSoftInputMode="adjustResize">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN"/>
                          <category android:name="android.intent.category.LAUNCHER"/>
                      </intent-filter>
                  </activity>
                  <meta-data
                      android:name="flutterEmbedding"
                      android:value="2"/>
              </application>
              <queries>
                  <intent>
                      <action android:name="android.intent.action.VIEW"/>
                      <data android:scheme="https"/>
                  </intent>
              </queries>
          </manifest>"""
          with open("android/app/src/main/AndroidManifest.xml", "w") as f:
              f.write(manifest)
          print("AndroidManifest corrigido!")
          PYEOF

          # Compilar APK
          flutter build apk --release --split-per-abi

      - name: Salvar APK
        uses: actions/upload-artifact@v4
        with:
          name: apk-minha-localizacao
          path: myapp/build/app/outputs/flutter-apk/*.apk
          retention-days: 7

