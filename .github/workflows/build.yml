name: Build APK Android

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Baixar codigo
        uses: actions/checkout@v4

      - name: Instalar Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Instalar Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Criar projeto e compilar APK
        run: |
          # Criar projeto Flutter limpo
          flutter create --org com.maicola --project-name locmaicola --platforms android myapp

          # Copiar codigo
          cp lib/main.dart myapp/lib/main.dart
          cp pubspec.yaml myapp/pubspec.yaml

          cd myapp

          # Instalar dependencias
          flutter pub get

          # Aplicar icone se existir
          if [ -f ../assets/icon.png ]; then
            for dir in xxxhdpi xxhdpi xhdpi hdpi mdpi; do
              cp ../assets/icon.png android/app/src/main/res/mipmap-$dir/ic_launcher.png
            done
            echo "Icone aplicado"
          fi

          # Mostrar estrutura Android gerada pelo Flutter
          echo "=== Estrutura android/ ==="
          find android -name "*.gradle" -o -name "*.kts" -o -name "*.toml" 2>/dev/null
          
          echo "=== settings.gradle ==="
          cat android/settings.gradle 2>/dev/null || cat android/settings.gradle.kts 2>/dev/null || echo "nao encontrado"
          
          echo "=== app/build.gradle ==="
          cat android/app/build.gradle 2>/dev/null || cat android/app/build.gradle.kts 2>/dev/null || echo "nao encontrado"

          echo "=== gradle/libs.versions.toml ==="
          cat android/gradle/libs.versions.toml 2>/dev/null || echo "nao encontrado"

      - name: Salvar APK placeholder
        run: echo "Build em diagnostico"
